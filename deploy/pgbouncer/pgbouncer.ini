; PgBouncer config for the always-on API (Phase 6, ADR-0012).
; SESSION pooling so psycopg3 prepared statements keep working (transaction pooling would
; need prepare_threshold=None on the SQLAlchemy engine). Auth via a SCRAM userlist that is
; generated on the host and NOT committed (see userlist.txt.example + the deploy runbook).
[databases]
second_brain = host=db port=5432 dbname=second_brain

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt
pool_mode = session
max_client_conn = 200
default_pool_size = 20
min_pool_size = 2
reserve_pool_size = 5
server_idle_timeout = 600
; pgvector/torch clients may send this GUC; let it through rather than erroring.
ignore_startup_parameters = extra_float_digits
