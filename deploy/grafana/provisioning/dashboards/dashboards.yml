# Grafana dashboard provisioning (Phase 6) — loads JSON dashboards from disk.
apiVersion: 1
providers:
  - name: second-brain
    orgId: 1
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
