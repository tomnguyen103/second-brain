# Alert rules (Phase 6, ADR-0012). Based on the metrics in app/obs/metrics.py.
groups:
  - name: second-brain
    rules:
      - alert: ApiDown
        expr: up{job="second-brain-api"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Second Brain API is down"
          description: "Prometheus cannot scrape the API /metrics target for 2m."

      - alert: HighErrorRate
        expr: |
          sum(rate(http_requests_total{status=~"5.."}[5m]))
            / clamp_min(sum(rate(http_requests_total[5m])), 1) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Elevated 5xx error rate (>5%)"
          description: "More than 5% of requests have returned 5xx over the last 5 minutes."

      - alert: HighLatencyP95
        expr: |
          histogram_quantile(0.95,
            sum(rate(http_request_duration_seconds_bucket[5m])) by (le)) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "p95 request latency above 2s"
          description: "The 95th-percentile HTTP latency has exceeded 2s for 5 minutes."
