# Prometheus scrape config (Phase 6, ADR-0012). Scrapes the FastAPI /metrics endpoint
# exposed by app/obs/metrics.py.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - alerts.yml

scrape_configs:
  - job_name: second-brain-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
