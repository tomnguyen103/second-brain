# Production stack for the single VPS (Phase 6, ADR-0011/0012). NOT run in CI and NOT the
# dev compose (that one is db-only). Bring up with:
#   docker compose -p second-brain -f deploy/docker-compose.prod.yml -f deploy/docker-compose.vps.yml --env-file deploy/.env.prod up -d --build
# Everything is one Docker Compose stack on one box, per AGENTS.md.
services:
  db:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.pgvector
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:?set POSTGRES_USER} -d ${POSTGRES_DB:?set POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Caching / rate-limit store (named in the stack). In-memory only, LRU eviction.
  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--save", "", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      SECOND_BRAIN_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:?set POSTGRES_USER}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:?set POSTGRES_DB}
      SECOND_BRAIN_LLM_PROVIDER: ${SECOND_BRAIN_LLM_PROVIDER:-gemini}
      SECOND_BRAIN_GEMINI_API_KEY: ${SECOND_BRAIN_GEMINI_API_KEY:-}
      SECOND_BRAIN_GEMINI_MODEL: ${SECOND_BRAIN_GEMINI_MODEL:-gemini-2.5-flash}
      SECOND_BRAIN_EMBEDDING_PROVIDER: ${SECOND_BRAIN_EMBEDDING_PROVIDER:-local}
      SECOND_BRAIN_API_TOKEN: ${SECOND_BRAIN_API_TOKEN:?set SECOND_BRAIN_API_TOKEN}
      SECOND_BRAIN_ADMIN_TOKEN: ${SECOND_BRAIN_ADMIN_TOKEN:-}
      SECOND_BRAIN_REDIS_ENABLED: ${SECOND_BRAIN_REDIS_ENABLED:-true}
      SECOND_BRAIN_REDIS_URL: ${SECOND_BRAIN_REDIS_URL:-redis://redis:6379/0}
      SECOND_BRAIN_RATE_LIMIT_FAIL_CLOSED: ${SECOND_BRAIN_RATE_LIMIT_FAIL_CLOSED:-true}
    command: ["sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"]
    ports:
      - "127.0.0.1:8000:8000"
    restart: unless-stopped

  # Durable-job worker (Phase 5, ADR-0013). Drains the jobs queue continuously: the daily
  # briefing (enqueued by host cron — see runbooks/deploy-checklist.md) and async research_topic
  # jobs. Same image/env/DSN as api (direct to Postgres); applies no migrations (api does) and
  # exposes no ports. depends_on api so the briefings table (migration 0004) exists first; a job
  # that still loses the race just retries (attempts) once the migration lands.
  worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_started
    environment:
      SECOND_BRAIN_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:?set POSTGRES_USER}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:?set POSTGRES_DB}
      SECOND_BRAIN_LLM_PROVIDER: ${SECOND_BRAIN_LLM_PROVIDER:-gemini}
      SECOND_BRAIN_GEMINI_API_KEY: ${SECOND_BRAIN_GEMINI_API_KEY:-}
      SECOND_BRAIN_GEMINI_MODEL: ${SECOND_BRAIN_GEMINI_MODEL:-gemini-2.5-flash}
      SECOND_BRAIN_EMBEDDING_PROVIDER: ${SECOND_BRAIN_EMBEDDING_PROVIDER:-local}
      SECOND_BRAIN_REDIS_ENABLED: ${SECOND_BRAIN_REDIS_ENABLED:-true}
      SECOND_BRAIN_REDIS_URL: ${SECOND_BRAIN_REDIS_URL:-redis://redis:6379/0}
    command: ["python", "-m", "app.jobs.worker", "--loop"]
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    depends_on:
      - api
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped

volumes:
  db_data:
