# Production stack for the single VPS (Phase 6, ADR-0011/0012). NOT run in CI and NOT the
# dev compose (that one is db-only). Bring up with:
#   docker compose -f deploy/docker-compose.prod.yml --env-file deploy/.env.prod up -d --build
# Everything is one Docker Compose stack on one box, per AGENTS.md.
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-second_brain}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-second_brain}
      POSTGRES_DB: ${POSTGRES_DB:-second_brain}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-second_brain} -d ${POSTGRES_DB:-second_brain}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Connection pooler for the always-on API. SESSION pooling (default) is used so psycopg3's
  # prepared statements keep working; transaction pooling would require prepare_threshold=None.
  pgbouncer:
    image: edoburu/pgbouncer:latest
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    restart: unless-stopped

  # Caching / rate-limit store (named in the stack). In-memory only, LRU eviction.
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    depends_on:
      db:
        condition: service_healthy
      pgbouncer:
        condition: service_started
      redis:
        condition: service_started
    environment:
      # App traffic goes through PgBouncer; DDL (alembic) goes straight to the DB.
      SECOND_BRAIN_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-second_brain}:${POSTGRES_PASSWORD:-second_brain}@pgbouncer:6432/${POSTGRES_DB:-second_brain}
      DIRECT_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-second_brain}:${POSTGRES_PASSWORD:-second_brain}@db:5432/${POSTGRES_DB:-second_brain}
      SECOND_BRAIN_LLM_PROVIDER: ${SECOND_BRAIN_LLM_PROVIDER:-gemini}
      SECOND_BRAIN_GEMINI_API_KEY: ${SECOND_BRAIN_GEMINI_API_KEY:-}
      SECOND_BRAIN_GEMINI_MODEL: ${SECOND_BRAIN_GEMINI_MODEL:-gemini-2.5-flash}
      SECOND_BRAIN_ADMIN_TOKEN: ${SECOND_BRAIN_ADMIN_TOKEN:-}
    # $$ escapes compose interpolation so the container shell expands DIRECT_DATABASE_URL.
    command: ["sh", "-c", "SECOND_BRAIN_DATABASE_URL=$$DIRECT_DATABASE_URL alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"]
    ports:
      - "8000:8000"
    restart: unless-stopped

  # Durable-job worker (Phase 5, ADR-0013). Drains the jobs queue continuously: the daily
  # briefing (enqueued by host cron — see runbooks/deploy-checklist.md) and async research_topic
  # jobs. Same image/env/DSN as api (traffic via PgBouncer); applies no migrations (api does) and
  # exposes no ports. depends_on api so the briefings table (migration 0004) exists first; a job
  # that still loses the race just retries (attempts) once the migration lands.
  worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    depends_on:
      db:
        condition: service_healthy
      pgbouncer:
        condition: service_started
      api:
        condition: service_started
    environment:
      SECOND_BRAIN_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-second_brain}:${POSTGRES_PASSWORD:-second_brain}@pgbouncer:6432/${POSTGRES_DB:-second_brain}
      SECOND_BRAIN_LLM_PROVIDER: ${SECOND_BRAIN_LLM_PROVIDER:-gemini}
      SECOND_BRAIN_GEMINI_API_KEY: ${SECOND_BRAIN_GEMINI_API_KEY:-}
      SECOND_BRAIN_GEMINI_MODEL: ${SECOND_BRAIN_GEMINI_MODEL:-gemini-2.5-flash}
    command: ["python", "-m", "app.jobs.worker", "--loop"]
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    depends_on:
      - api
    ports:
      - "3000:3000"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    ports:
      - "3001:3000"
    restart: unless-stopped

volumes:
  db_data:
  prometheus_data:
  grafana_data:
