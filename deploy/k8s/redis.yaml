# Redis cache (caching / rate-limit store only — AGENTS.md). In-memory, no persistence
# (--save ""), LRU eviction at 256mb — matches the compose service. The app treats Redis as an
# optional cache, so nothing gates readiness on it.
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: second-brain
  labels:
    app.kubernetes.io/part-of: second-brain
    app: redis
spec:
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: second-brain
  labels:
    app.kubernetes.io/part-of: second-brain
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
        app.kubernetes.io/part-of: second-brain
    spec:
      containers:
        - name: redis
          image: redis:7.4-alpine
          args: ["redis-server", "--save", "", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
          ports:
            - name: redis
              containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "320Mi"
