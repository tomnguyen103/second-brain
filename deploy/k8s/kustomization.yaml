# Convenience one-shot apply of the core learning-track stack:
#   kubectl apply -k deploy/k8s
#
# NOTE: kustomize applies all resources together; it does not order them. Readiness converges via
# probes plus the migrate Job's OnFailure/backoff behavior.
#
# PREREQUISITES, by design:
#   1. The Secret, created out-of-band; see secret.example.yaml.
#   2. ingress-nginx and metrics-server cluster add-ons; see README.md and k8s.yml.
#
# Monitoring manifests are retained under deploy/k8s/monitoring, but the default learning-track
# apply does not start Prometheus/Grafana until scanned-clean local images are supplied.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: second-brain

resources:
  - namespace.yaml
  - configmap.yaml
  - postgres-statefulset.yaml
  - migrate-job.yaml
  - redis.yaml
  - api.yaml
  - worker.yaml
  - frontend.yaml
  - ingress.yaml
  - api-hpa.yaml
