# Historical PgBouncer learning-track manifest. This file is not referenced by kustomization.yaml:
# production and the current learning-track path connect directly to Postgres because public
# PgBouncer vendor images had unresolved CVEs. If you re-enable this, build/load a scanned-clean
# local image with this tag first; imagePullPolicy prevents an accidental public pull.
apiVersion: v1
kind: Service
metadata:
  name: pgbouncer
  namespace: second-brain
  labels:
    app.kubernetes.io/part-of: second-brain
    app: pgbouncer
spec:
  selector:
    app: pgbouncer
  ports:
    - name: pgbouncer
      port: 6432
      targetPort: 6432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgbouncer
  namespace: second-brain
  labels:
    app.kubernetes.io/part-of: second-brain
    app: pgbouncer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pgbouncer
  template:
    metadata:
      labels:
        app: pgbouncer
        app.kubernetes.io/part-of: second-brain
    spec:
      containers:
        - name: pgbouncer
          image: second-brain-pgbouncer:phase7-clean-required
          imagePullPolicy: Never
          ports:
            - name: pgbouncer
              containerPort: 6432
          env:
            - name: DB_HOST
              value: db
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: second-brain-config
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: second-brain-secrets
                  key: POSTGRES_PASSWORD
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: second-brain-config
                  key: POSTGRES_DB
            - name: POOL_MODE
              value: session            # ADR-0012: session mode keeps psycopg3 prepared statements working
            - name: AUTH_TYPE
              value: scram-sha-256      # matches Postgres 16 default password encryption
            - name: MAX_CLIENT_CONN
              value: "100"
            - name: DEFAULT_POOL_SIZE
              value: "20"
            - name: LISTEN_PORT
              value: "6432"
          readinessProbe:
            tcpSocket:
              port: 6432
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            tcpSocket:
              port: 6432
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
