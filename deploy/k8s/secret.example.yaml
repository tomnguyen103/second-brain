# TEMPLATE ONLY (D4) — this file documents the Secret's shape. NEVER commit the real Secret.
# The real Secret is created out-of-band so no credential ever enters git:
#
#   kubectl -n second-brain create secret generic second-brain-secrets \
#     --from-literal=POSTGRES_PASSWORD='<choose-one>' \
#     --from-literal=SECOND_BRAIN_API_TOKEN='<choose-one>' \
#     --from-literal=SECOND_BRAIN_ADMIN_TOKEN='<choose-one>' \
#     --from-literal=SECOND_BRAIN_GEMINI_API_KEY=''
#
# (CI creates it with throwaway dummy values from workflow env — see .github/workflows/k8s.yml.)
# If you ever render a real Secret to a file, name it deploy/k8s/secret.yaml — it is gitignored.
# Add GRAFANA_ADMIN_PASSWORD only if you intentionally apply monitoring/grafana.yaml with a
# scanned-clean local Grafana image.
apiVersion: v1
kind: Secret
metadata:
  name: second-brain-secrets
  namespace: second-brain
  labels:
    app.kubernetes.io/part-of: second-brain
type: Opaque
stringData:
  POSTGRES_PASSWORD: "change-me-postgres-password"
  SECOND_BRAIN_API_TOKEN: "change-me-api-token"
  SECOND_BRAIN_ADMIN_TOKEN: "change-me-admin-token"
  SECOND_BRAIN_GEMINI_API_KEY: ""          # unused while SECOND_BRAIN_LLM_PROVIDER=fake
