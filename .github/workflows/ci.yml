name: CI

# Eval-gated CI (Phase 6, ADR-0012): unit tests → integration tests (vs pgvector) →
# eval quality gate. A regression in retrieval/citation quality fails the pipeline,
# which is what "deploy blocked if quality regresses" means in practice.

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # CI uses the service-container default port 5432 (no native Postgres to clash with,
  # unlike local dev which publishes the Docker DB on 5433).
  PG_DSN: postgresql+psycopg://second_brain:second_brain@localhost:5432/second_brain

jobs:
  unit-tests:
    name: Unit tests (DB-free)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
      - name: Cache Hugging Face model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-${{ runner.os }}-minilm
      - name: Install dependencies
        run: uv pip install --system -r requirements.txt
      - name: Run unit tests
        run: pytest tests/unit -q

  integration-tests:
    name: Integration tests (vs Postgres + pgvector)
    runs-on: ubuntu-latest
    needs: unit-tests
    defaults:
      run:
        working-directory: backend
    services:
      db:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: second_brain
          POSTGRES_PASSWORD: second_brain
          POSTGRES_DB: second_brain
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U second_brain -d second_brain"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      SECOND_BRAIN_DATABASE_URL: postgresql+psycopg://second_brain:second_brain@localhost:5432/second_brain
      SECOND_BRAIN_TEST_DATABASE_URL: postgresql+psycopg://second_brain:second_brain@localhost:5432/second_brain
      SECOND_BRAIN_LLM_PROVIDER: fake
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
      - name: Cache Hugging Face model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-${{ runner.os }}-minilm
      - name: Install dependencies
        run: uv pip install --system -r requirements.txt
      - name: Apply migrations
        run: alembic upgrade head
      - name: Run full test suite (unit + integration)
        run: pytest -q

  eval-gate:
    name: Eval quality gate
    runs-on: ubuntu-latest
    needs: integration-tests
    defaults:
      run:
        working-directory: backend
    services:
      db:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: second_brain
          POSTGRES_PASSWORD: second_brain
          POSTGRES_DB: second_brain
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U second_brain -d second_brain"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      SECOND_BRAIN_DATABASE_URL: postgresql+psycopg://second_brain:second_brain@localhost:5432/second_brain
      SECOND_BRAIN_LLM_PROVIDER: fake
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
      - name: Cache Hugging Face model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-${{ runner.os }}-minilm
      - name: Install dependencies
        run: uv pip install --system -r requirements.txt
      - name: Apply migrations
        run: alembic upgrade head
      - name: Run eval gate (fails the build on quality regression)
        run: python -m app.eval.gate
