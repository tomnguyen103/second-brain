name: CI

# Eval-gated CI (Phase 6, ADR-0012): unit tests → integration tests (vs pgvector) →
# eval quality gate. A regression in retrieval/citation quality fails the pipeline,
# which is what "deploy blocked if quality regresses" means in practice.

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # CI starts a throwaway local Docker database on 5432; local dev publishes the DB on 5433.
  PG_DSN: postgresql+psycopg://second_brain:second_brain@localhost:5432/second_brain

jobs:
  compose-config:
    name: Compose config render
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Render production + VPS template
        env:
          POSTGRES_USER: second_brain
          POSTGRES_PASSWORD: dummy_postgres_password
          POSTGRES_DB: second_brain
          SECOND_BRAIN_API_TOKEN: dummy_api_token
          SECOND_BRAIN_ADMIN_TOKEN: dummy_admin_token
          SECOND_BRAIN_LLM_PROVIDER: fake
          SECOND_BRAIN_GEMINI_API_KEY: dummy_gemini_key
          NEXT_PUBLIC_API_BASE_URL: https://127.0.0.1.sslip.io/api
          SECOND_BRAIN_CORS_ORIGINS: '["https://127.0.0.1.sslip.io"]'
          CADDY_SITE_ADDRESS: 127.0.0.1.sslip.io
        run: |
          docker compose -p second-brain \
            -f deploy/docker-compose.prod.yml \
            -f deploy/docker-compose.vps.yml.example \
            config >/tmp/second-brain-compose.yml

  unit-tests:
    name: Unit tests (DB-free)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
      - name: Cache Hugging Face model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-${{ runner.os }}-minilm
      - name: Install dependencies
        run: uv pip install --system -r requirements.txt
      - name: Run unit tests
        run: pytest tests/unit -q

  frontend:
    name: Frontend lint and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_TELEMETRY_DISABLED: 1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run lint
        run: npm run lint
      - name: Build frontend
        run: npm run build

  integration-tests:
    name: Integration tests (vs Postgres + pgvector)
    runs-on: ubuntu-latest
    needs: unit-tests
    defaults:
      run:
        working-directory: backend
    env:
      SECOND_BRAIN_DATABASE_URL: postgresql+psycopg://second_brain:second_brain@localhost:5432/second_brain
      SECOND_BRAIN_TEST_DATABASE_URL: postgresql+psycopg://second_brain:second_brain@localhost:5432/second_brain
      SECOND_BRAIN_LLM_PROVIDER: fake
    steps:
      - uses: actions/checkout@v4
      - name: Start cleaned pgvector database
        run: |
          docker build -f ../deploy/Dockerfile.pgvector -t second-brain-pgvector:ci ..
          docker run -d --name second-brain-ci-db \
            -e POSTGRES_USER=second_brain \
            -e POSTGRES_PASSWORD=second_brain \
            -e POSTGRES_DB=second_brain \
            -p 5432:5432 \
            second-brain-pgvector:ci
          for i in $(seq 1 30); do
            docker exec second-brain-ci-db pg_isready -U second_brain -d second_brain && exit 0
            sleep 2
          done
          docker logs second-brain-ci-db
          exit 1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
      - name: Cache Hugging Face model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-${{ runner.os }}-minilm
      - name: Install dependencies
        run: uv pip install --system -r requirements.txt
      - name: Apply migrations
        run: alembic upgrade head
      - name: Run full test suite (unit + integration)
        run: pytest -q
      - name: Stop cleaned pgvector database
        if: always()
        run: docker rm -f second-brain-ci-db || true

  eval-gate:
    name: Eval quality gate
    runs-on: ubuntu-latest
    needs: integration-tests
    defaults:
      run:
        working-directory: backend
    env:
      SECOND_BRAIN_DATABASE_URL: postgresql+psycopg://second_brain:second_brain@localhost:5432/second_brain
      SECOND_BRAIN_LLM_PROVIDER: fake
    steps:
      - uses: actions/checkout@v4
      - name: Start cleaned pgvector database
        run: |
          docker build -f ../deploy/Dockerfile.pgvector -t second-brain-pgvector:ci ..
          docker run -d --name second-brain-ci-db \
            -e POSTGRES_USER=second_brain \
            -e POSTGRES_PASSWORD=second_brain \
            -e POSTGRES_DB=second_brain \
            -p 5432:5432 \
            second-brain-pgvector:ci
          for i in $(seq 1 30); do
            docker exec second-brain-ci-db pg_isready -U second_brain -d second_brain && exit 0
            sleep 2
          done
          docker logs second-brain-ci-db
          exit 1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
      - name: Cache Hugging Face model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-${{ runner.os }}-minilm
      - name: Install dependencies
        run: uv pip install --system -r requirements.txt
      - name: Apply migrations
        run: alembic upgrade head
      - name: Run eval gate (fails the build on quality regression)
        run: python -m app.eval.gate
      - name: Stop cleaned pgvector database
        if: always()
        run: docker rm -f second-brain-ci-db || true
